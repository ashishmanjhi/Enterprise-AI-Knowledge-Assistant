[pytest]
# Pytest configuration for Enterprise RAG Platform

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = backend/tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring services
    e2e: End-to-end tests
    slow: Tests that take significant time
    requires_ollama: Tests that require Ollama to be running
    requires_gpu: Tests that require GPU

# Coverage options (if using pytest-cov)
# addopts = --cov=backend --cov-report=html --cov-report=term

# Asyncio configuration
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (in seconds)
# timeout = 300

# Ignore paths
norecursedirs = .git .venv venv env __pycache__ *.egg-info

